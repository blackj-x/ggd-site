<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f274d"/>
      <stop offset="1" stop-color="#272044"/>
    </linearGradient>
    <linearGradient id="hall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262043"/>
      <stop offset="1" stop-color="#1f1a37"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rm{fill:url(#room);stroke:#54466e;stroke-width:1.5;rx:14}
      .hl{fill:url(#hall);stroke:#3a3266;stroke-width:1.2}
      .rname{fill:#dcd3f5;font-size:15px;font-weight:700;text-anchor:middle}
      .ren{fill:#998cb8;font-size:10px;text-anchor:middle}
      .conn{stroke:#3a3266;stroke-width:6;fill:none;stroke-linecap:round}
      .pin-label{fill:#f3f0ff;font-size:11px;font-weight:700}
      .pin-bg{fill:#1c1838;stroke-width:1;opacity:.92;rx:5}
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="460" fill="#151229"/>
  <text x="24" y="34" fill="#f3f0ff" font-size="20" font-weight="900">古代沙地 · 区域示意图</text>
  <text x="24" y="52" fill="#a99fd6" font-size="12">Ancient Sands · 沙漠开放布局，建筑经街道沙地相连 · 东侧河道小船往返 · 原创示意图（非游戏截图）</text>

  <!-- 连接通道（先画，压在房间下层） -->
  <path class="conn" d="M405 146 L405 190"/>      <!-- 金字塔-街道（入口） -->
  <path class="conn" d="M300 232 L220 232"/>      <!-- 街道-图书馆 -->
  <path class="conn" d="M145 150 L145 196"/>      <!-- 鹅蛋神庙-图书馆 -->
  <path class="conn" d="M150 268 L178 308"/>      <!-- 图书馆-工匠之家 -->
  <path class="conn" d="M370 270 L350 300"/>      <!-- 街道-花园 -->
  <path class="conn" d="M280 334 L260 338"/>      <!-- 花园-工匠之家 -->
  <path class="conn" d="M510 228 L535 228"/>      <!-- 街道-水塘（金字塔东南） -->
  <path class="conn" d="M622 206 L662 132"/>      <!-- 水塘-北港 -->
  <path class="conn" d="M618 252 L650 262"/>      <!-- 水塘-南港 -->
  <path class="conn" d="M410 334 L450 352"/>      <!-- 花园-农场 -->
  <path class="conn" d="M580 364 L620 372"/>      <!-- 农场-供应小屋 -->
  <path class="conn" d="M578 344 L640 296"/>      <!-- 农场-南港（小船停靠） -->

  <!-- 小船航线（北港-南港自动往返） -->
  <path d="M705 134 L705 238" stroke="#6ea8d8" stroke-width="2.5" stroke-dasharray="6 5" fill="none" opacity=".75"/>
  <!-- 禁忌通道（鸭子/鸽子/模仿者专用，通往右上屋顶魔镜） -->
  <path d="M500 196 C 555 150 595 92 648 46" stroke="#b06bff" stroke-width="2.5" stroke-dasharray="5 5" fill="none" opacity=".55"/>
  <text x="640" y="42" fill="#b793e8" font-size="10" text-anchor="end">屋顶魔镜 CCTV · 禁忌通道尽头（好人无法到达）</text>

  <!-- 房间 -->
  <!-- 鹅蛋神庙 -->
  <rect class="rm" x="70" y="78" width="150" height="72"/>
  <text class="rname" x="145" y="110">鹅蛋神庙</text>
  <text class="ren" x="145" y="126">Goose Egg Temple · 窥视孔</text>
  <!-- 金字塔（核心地标） -->
  <rect class="rm" x="315" y="62" width="180" height="84" fill="#383052" stroke="#8d7b52"/>
  <text class="rname" x="405" y="98">金字塔</text>
  <text class="ren" x="405" y="114">Pyramid · 大门只能外开</text>
  <text x="405" y="132" fill="#d9b96c" font-size="10" text-anchor="middle">上方房间：全图关门破坏点</text>
  <!-- 北港 -->
  <rect class="rm" x="640" y="66" width="130" height="66"/>
  <text class="rname" x="705" y="96">北港</text>
  <text class="ren" x="705" y="112">North Port</text>
  <!-- 图书馆 -->
  <rect class="rm" x="70" y="196" width="150" height="72"/>
  <text class="rname" x="145" y="228">图书馆</text>
  <text class="ren" x="145" y="244">Library · 召唤木乃伊</text>
  <!-- 街道（中央，会议铃） -->
  <rect class="rm" x="300" y="190" width="210" height="80" fill="#322a5e" stroke="#5b4fa0"/>
  <text class="rname" x="405" y="214">街道</text>
  <text class="ren" x="405" y="230">The Streets · 金字塔入口 · 会议铃</text>
  <!-- 水塘 -->
  <rect class="rm" x="530" y="200" width="110" height="58"/>
  <text class="rname" x="585" y="226">水塘</text>
  <text class="ren" x="585" y="242">Pond · 取水灭火</text>
  <!-- 南港 -->
  <rect class="rm" x="640" y="240" width="130" height="66"/>
  <text class="rname" x="705" y="270">南港</text>
  <text class="ren" x="705" y="286">South Port</text>
  <!-- 花园 -->
  <rect class="rm" x="280" y="300" width="130" height="64"/>
  <text class="rname" x="345" y="330">花园</text>
  <text class="ren" x="345" y="346">Garden</text>
  <!-- 工匠之家 -->
  <rect class="rm" x="110" y="308" width="150" height="66"/>
  <text class="rname" x="185" y="338">工匠之家</text>
  <text class="ren" x="185" y="354">Artisan's House · 献祭之铃</text>
  <!-- 农场 -->
  <rect class="rm" x="450" y="330" width="130" height="64"/>
  <text class="rname" x="515" y="360">农场</text>
  <text class="ren" x="515" y="376">Farm · 小船停靠</text>
  <!-- 供应小屋（右下角，纵火点） -->
  <rect class="rm" x="620" y="345" width="150" height="66" fill="#3a2535" stroke="#7a4a5a"/>
  <text class="rname" x="695" y="375">供应小屋</text>
  <text class="ren" x="695" y="391">Supply Hut · 纵火破坏</text>

  <!-- ===== 标注点（坐标 = 数据中 x%,y% × 800/460）===== -->
  <!-- meeting 街道会议铃 50.6,54.8 -->
  <g filter="url(#glow)"><circle cx="405" cy="252" r="9" fill="#4ade80"/><text x="405" y="256" font-size="10" text-anchor="middle">🔔</text></g>
  <!-- killspot 图书馆召唤木乃伊 13.1,46.1 -->
  <g filter="url(#glow)"><circle cx="105" cy="212" r="9" fill="#ff5470"/><text x="105" y="216" font-size="10" text-anchor="middle">🔪</text></g>
  <!-- hide 神庙窥视孔 13.1,30 -->
  <circle cx="105" cy="138" r="8" fill="#5eead4"/><text x="105" y="141" font-size="9" text-anchor="middle">👁</text>
  <!-- hazard 工匠之家献祭之铃 16.5,70 -->
  <g filter="url(#glow)"><circle cx="132" cy="322" r="9" fill="#fb923c"/><text x="132" y="326" font-size="10" text-anchor="middle">⚠</text></g>
  <!-- blindspot 空旷沙地沙暴 53,87 -->
  <circle cx="424" cy="400" r="8" fill="#b06bff"/><text x="424" y="403" font-size="9" text-anchor="middle">🌫</text>
  <text x="424" y="421" fill="#998cb8" font-size="10" text-anchor="middle">空旷沙地 · 沙暴视野区</text>
  <!-- task 水塘取水 68.8,49 -->
  <circle cx="550" cy="225" r="8" fill="#3ba9ff"/><text x="550" y="228" font-size="9" text-anchor="middle">📋</text>
  <!-- task 船上钓鱼 88.1,41.3 -->
  <circle cx="705" cy="190" r="8" fill="#3ba9ff"/><text x="705" y="193" font-size="9" text-anchor="middle">📋</text>
  <!-- hazard 供应小屋纵火 81.3,78 -->
  <g filter="url(#glow)"><circle cx="650" cy="359" r="10" fill="#fb923c"/><text x="650" y="363" font-size="11" text-anchor="middle">⚠</text></g>
  <!-- vent(禁忌通道) 屋顶魔镜 81.9,8.3 -->
  <g filter="url(#glow)"><circle cx="655" cy="38" r="8" fill="#ffd84e"/><text x="655" y="41" font-size="9" text-anchor="middle">🕳</text></g>

  <!-- 图例 -->
  <g transform="translate(24,440)">
    <circle cx="6" cy="0" r="6" fill="#3ba9ff"/><text x="18" y="4" fill="#a99fd6" font-size="11">任务点</text>
    <circle cx="92" cy="0" r="6" fill="#ff5470"/><text x="104" y="4" fill="#a99fd6" font-size="11">刀点</text>
    <circle cx="156" cy="0" r="6" fill="#b06bff"/><text x="168" y="4" fill="#a99fd6" font-size="11">盲区</text>
    <circle cx="222" cy="0" r="6" fill="#ffd84e"/><text x="234" y="4" fill="#a99fd6" font-size="11">禁忌通道</text>
    <circle cx="312" cy="0" r="6" fill="#4ade80"/><text x="324" y="4" fill="#a99fd6" font-size="11">会议铃</text>
    <circle cx="392" cy="0" r="6" fill="#fb923c"/><text x="404" y="4" fill="#a99fd6" font-size="11">破坏点</text>
    <circle cx="472" cy="0" r="6" fill="#5eead4"/><text x="484" y="4" fill="#a99fd6" font-size="11">观察/躲藏</text>
  </g>
</svg>
