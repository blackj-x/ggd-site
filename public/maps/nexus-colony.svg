<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#272a55"/>
      <stop offset="1" stop-color="#201f46"/>
    </linearGradient>
    <linearGradient id="hall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#211f46"/>
      <stop offset="1" stop-color="#1b1939"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rm{fill:url(#room);stroke:#4452a0;stroke-width:1.5;rx:14}
      .hl{fill:url(#hall);stroke:#373a6e;stroke-width:1.2}
      .rname{fill:#d8d8ff;font-size:15px;font-weight:700;text-anchor:middle}
      .ren{fill:#8a8cc0;font-size:10px;text-anchor:middle}
      .conn{stroke:#373a6e;stroke-width:6;fill:none;stroke-linecap:round}
      .link{stroke:#4fc3d9;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-dasharray:6 6;opacity:.75}
      .pin-label{fill:#f3f0ff;font-size:11px;font-weight:700}
      .pin-bg{fill:#1c1838;stroke-width:1;opacity:.92;rx:5}
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="460" fill="#151229"/>
  <text x="24" y="34" fill="#f3f0ff" font-size="20" font-weight="900">星枢殖民地 · 区域示意图</text>
  <text x="24" y="52" fill="#a99fd6" font-size="12">Nexus Colony · 主站区 + 独立坞区双建筑动线 · 原创示意图（非游戏截图）</text>

  <!-- 连接通道（先画，压在房间下层） -->
  <path class="conn" d="M400 150 L400 185"/>     <!-- 安全室-舰桥 -->
  <path class="conn" d="M240 160 L275 200"/>     <!-- 电力室-中部走廊（通舰桥） -->
  <path class="conn" d="M140 176 L140 335"/>     <!-- 电力-装卸舱-下层走廊-引擎（左侧纵向） -->
  <path class="conn" d="M195 260 L285 350"/>     <!-- 装卸舱-传送室·西 -->
  <path class="conn" d="M465 238 L575 272"/>     <!-- 舰桥-医疗室 -->
  <path class="conn" d="M615 250 L615 220"/>     <!-- 医疗室-出发舱 -->
  <path class="conn" d="M635 355 L635 326"/>     <!-- 传送室·东-医疗室 -->
  <!-- 穿梭机航线（出发舱→独立坞区，唯一通路） -->
  <path class="link" d="M622 150 L655 130"/>
  <!-- 传送器连线（西↔东） -->
  <path class="link" d="M350 372 L580 384"/>

  <!-- 房间 -->
  <!-- 安全室（中上，监控/传送器破坏点） -->
  <rect class="rm" x="335" y="80" width="130" height="70"/>
  <text class="rname" x="400" y="110">安全室</text>
  <text class="ren" x="400" y="128">Security · 监控</text>
  <!-- 电力室（左上） -->
  <rect class="rm" x="110" y="100" width="140" height="76"/>
  <text class="rname" x="180" y="124">电力室</text>
  <text class="ren" x="180" y="166">Electrical · 灯光破坏</text>
  <!-- 独立坞区（右上角外侧，仅穿梭机可达） -->
  <rect class="rm" x="610" y="60" width="150" height="70" fill="#3a2535" stroke="#7a4a5a"/>
  <text class="rname" x="685" y="82">独立坞区</text>
  <text class="ren" x="685" y="116">Docking · 仅穿梭机可达</text>
  <!-- 出发舱（右上，穿梭机登乘点） -->
  <rect class="rm" x="545" y="150" width="130" height="70"/>
  <text class="rname" x="610" y="178">出发舱</text>
  <text class="ren" x="610" y="196">Departure · 穿梭机</text>
  <!-- 舰桥（中央，会议按钮/通讯） -->
  <rect class="rm" x="335" y="185" width="130" height="78" fill="#2c2a60" stroke="#5b5aaa"/>
  <text class="rname" x="400" y="206">舰桥</text>
  <text class="ren" x="400" y="250">Bridge · 通讯/按钮</text>
  <!-- 中部走廊（电力室↔舰桥，通风口所在） -->
  <rect class="hl" x="250" y="185" width="85" height="40"/>
  <text class="ren" x="305" y="210">走廊</text>
  <!-- 装卸舱（左中，可查看传送器状态） -->
  <rect class="rm" x="70" y="210" width="130" height="66"/>
  <text class="rname" x="135" y="238">装卸舱</text>
  <text class="ren" x="135" y="256">Loading · 传送器状态</text>
  <!-- 下层走廊（无监控死角） -->
  <rect class="hl" x="70" y="290" width="120" height="40"/>
  <text class="ren" x="160" y="315">走廊</text>
  <!-- 引擎室（左下） -->
  <rect class="rm" x="70" y="330" width="140" height="72"/>
  <text class="rname" x="140" y="362">引擎室</text>
  <text class="ren" x="140" y="380">Engines · 引擎破坏</text>
  <!-- 医疗室（右中偏下） -->
  <rect class="rm" x="560" y="250" width="140" height="76"/>
  <text class="rname" x="630" y="273">医疗室</text>
  <text class="ren" x="630" y="312">Medical · 氧气/扫描</text>
  <!-- 传送室·西（左下） -->
  <rect class="rm" x="230" y="340" width="120" height="60"/>
  <text class="rname" x="290" y="366">传送室·西</text>
  <text class="ren" x="290" y="384">Teleporter W</text>
  <!-- 传送室·东（右下） -->
  <rect class="rm" x="580" y="355" width="120" height="60"/>
  <text class="rname" x="640" y="381">传送室·东</text>
  <text class="ren" x="640" y="399">Teleporter E</text>

  <!-- 提示小字 -->
  <text x="786" y="50" fill="#ff8fa3" font-size="10" text-anchor="end">⚠ 平台勿停留：穿梭机进站撞死</text>
  <text x="356" y="416" fill="#4fc3d9" font-size="10">传送器连接东西两翼 · 需前置任务激活</text>

  <!-- ===== 标注点（坐标 = 数据中 x%,y% × 800/460，不可改）===== -->
  <!-- meeting 50,48 中央会议按钮 -->
  <g filter="url(#glow)"><circle cx="400" cy="220.8" r="9" fill="#4ade80"/><text x="400" y="224.8" font-size="10" text-anchor="middle">🔔</text></g>
  <!-- task 上层电力室 22,30 -->
  <circle cx="176" cy="138" r="8" fill="#3ba9ff"/><text x="176" y="141" font-size="9" text-anchor="middle">📋</text>
  <!-- task 医疗室 78,62 -->
  <circle cx="624" cy="285.2" r="8" fill="#3ba9ff"/><text x="624" y="288.2" font-size="9" text-anchor="middle">📋</text>
  <!-- killspot 下层走廊死角 16,68 -->
  <g filter="url(#glow)"><circle cx="128" cy="312.8" r="9" fill="#ff5470"/><text x="128" y="316.8" font-size="10" text-anchor="middle">🔪</text></g>
  <!-- vent 中部通风口 34,44 -->
  <g filter="url(#glow)"><circle cx="272" cy="202.4" r="8" fill="#ffd84e"/><text x="272" y="205.4" font-size="9" text-anchor="middle">🕳</text></g>
  <!-- blindspot 独立坞区 85,20 -->
  <circle cx="680" cy="92" r="8" fill="#b06bff"/><text x="680" y="95" font-size="9" text-anchor="middle">🌫</text>

  <!-- 图例 -->
  <g transform="translate(24,440)">
    <circle cx="6" cy="0" r="6" fill="#3ba9ff"/><text x="18" y="4" fill="#a99fd6" font-size="11">任务点</text>
    <circle cx="92" cy="0" r="6" fill="#ff5470"/><text x="104" y="4" fill="#a99fd6" font-size="11">刀点</text>
    <circle cx="156" cy="0" r="6" fill="#b06bff"/><text x="168" y="4" fill="#a99fd6" font-size="11">盲区</text>
    <circle cx="222" cy="0" r="6" fill="#ffd84e"/><text x="234" y="4" fill="#a99fd6" font-size="11">通风口</text>
    <circle cx="300" cy="0" r="6" fill="#4ade80"/><text x="312" y="4" fill="#a99fd6" font-size="11">会议按钮</text>
    <path class="link" d="M390 0 L420 0"/><text x="428" y="4" fill="#a99fd6" font-size="11">穿梭机/传送连接</text>
  </g>
</svg>
