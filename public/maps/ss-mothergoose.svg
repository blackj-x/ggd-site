<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2452"/>
      <stop offset="1" stop-color="#221d44"/>
    </linearGradient>
    <linearGradient id="hall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221d44"/>
      <stop offset="1" stop-color="#1c1838"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rm{fill:url(#room);stroke:#4a3f80;stroke-width:1.5;rx:14}
      .hl{fill:url(#hall);stroke:#3a3266;stroke-width:1.2}
      .rname{fill:#d8d0ff;font-size:15px;font-weight:700;text-anchor:middle}
      .ren{fill:#8b81b8;font-size:10px;text-anchor:middle}
      .conn{stroke:#3a3266;stroke-width:6;fill:none;stroke-linecap:round}
      .pin-label{fill:#f3f0ff;font-size:11px;font-weight:700}
      .pin-bg{fill:#1c1838;stroke-width:1;opacity:.92;rx:5}
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="460" fill="#151229"/>
  <text x="24" y="34" fill="#f3f0ff" font-size="20" font-weight="900">老妈鹅飞船 · 舱室示意图</text>
  <text x="24" y="52" fill="#a99fd6" font-size="12">S.S. Mother Goose · 横向动线 · 原创示意图（非游戏截图）</text>

  <!-- 连接通道（先画，压在房间下层） -->
  <path class="conn" d="M150 165 L150 250"/>      <!-- 电力-反应堆 -->
  <path class="conn" d="M210 140 L330 140"/>      <!-- 电力-安保 -->
  <path class="conn" d="M210 295 L300 320"/>      <!-- 反应堆-孵化 -->
  <path class="conn" d="M390 175 L390 215"/>      <!-- 安保-娱乐 -->
  <path class="conn" d="M460 235 L560 150"/>      <!-- 娱乐-舰桥 -->
  <path class="conn" d="M460 250 L640 250"/>      <!-- 娱乐-货舱 -->
  <path class="conn" d="M360 290 L360 250"/>      <!-- 下层走廊-娱乐 -->
  <path class="conn" d="M620 175 L660 215"/>      <!-- 舰桥-货舱 -->

  <!-- 房间 -->
  <!-- 电力室 -->
  <rect class="rm" x="70" y="100" width="140" height="78"/>
  <text class="rname" x="140" y="135">电力室</text>
  <text class="ren" x="140" y="153">Electrical</text>
  <!-- 反应堆 -->
  <rect class="rm" x="70" y="250" width="140" height="78"/>
  <text class="rname" x="140" y="285">反应堆</text>
  <text class="ren" x="140" y="303">Reactor</text>
  <!-- 孵化室 -->
  <rect class="rm" x="240" y="318" width="140" height="72"/>
  <text class="rname" x="310" y="350">孵化室</text>
  <text class="ren" x="310" y="368">Hatchery</text>
  <!-- 安保室 -->
  <rect class="rm" x="320" y="100" width="140" height="76"/>
  <text class="rname" x="390" y="133">安保室</text>
  <text class="ren" x="390" y="151">Security · 监控</text>
  <!-- 娱乐室（中央，会议按钮） -->
  <rect class="rm" x="330" y="215" width="130" height="78" fill="#2f2860" stroke="#5b4fa0"/>
  <text class="rname" x="395" y="248">娱乐室</text>
  <text class="ren" x="395" y="266">Rec · 会议按钮</text>
  <!-- 下层走廊 -->
  <rect class="hl" x="240" y="250" width="80" height="40"/>
  <text class="ren" x="280" y="274">走廊</text>
  <!-- 舰桥 -->
  <rect class="rm" x="550" y="100" width="140" height="78"/>
  <text class="rname" x="620" y="133">舰桥</text>
  <text class="ren" x="620" y="151">Bridge · 气闸杆</text>
  <!-- 货舱 -->
  <rect class="rm" x="630" y="215" width="140" height="100" fill="#3a2535" stroke="#7a4a5a"/>
  <text class="rname" x="700" y="252">货舱</text>
  <text class="ren" x="700" y="270">Cargo · 气闸陷阱</text>
  <text x="700" y="294" fill="#ff8fa3" font-size="10" text-anchor="middle">⚠ 危险区</text>

  <!-- ===== 标注点（坐标 = 数据中 x%,y% × 800/460）===== -->
  <!-- meeting 50,50 -->
  <g filter="url(#glow)"><circle cx="400" cy="230" r="9" fill="#4ade80"/><text x="400" y="234" font-size="10" text-anchor="middle">🔔</text></g>
  <!-- task 电力 13,33 -->
  <circle cx="104" cy="152" r="8" fill="#3ba9ff"/><text x="104" y="155" font-size="9" text-anchor="middle">📋</text>
  <!-- task 反应堆 13,67 -->
  <circle cx="104" cy="308" r="8" fill="#3ba9ff"/><text x="104" y="311" font-size="9" text-anchor="middle">📋</text>
  <!-- task 孵化 30,78 -->
  <circle cx="240" cy="359" r="8" fill="#3ba9ff"/><text x="240" y="362" font-size="9" text-anchor="middle">📋</text>
  <!-- task 舰桥 72,30 -->
  <circle cx="576" cy="138" r="8" fill="#3ba9ff"/><text x="576" y="141" font-size="9" text-anchor="middle">📋</text>
  <!-- task 安保 40,33 -->
  <circle cx="320" cy="152" r="8" fill="#3ba9ff"/><text x="320" y="155" font-size="9" text-anchor="middle">📋</text>
  <!-- vent 40,40 -->
  <g filter="url(#glow)"><circle cx="320" cy="184" r="8" fill="#ffd84e"/><text x="320" y="187" font-size="9" text-anchor="middle">🕳</text></g>
  <!-- hazard 货舱气闸 85,67 -->
  <g filter="url(#glow)"><circle cx="680" cy="308" r="10" fill="#fb923c"/><text x="680" y="312" font-size="11" text-anchor="middle">⚠</text></g>
  <!-- killspot 货舱死角 85,50 -->
  <g filter="url(#glow)"><circle cx="680" cy="230" r="9" fill="#ff5470"/><text x="680" y="234" font-size="10" text-anchor="middle">🔪</text></g>
  <!-- blindspot 下层走廊 30,62 -->
  <circle cx="240" cy="285" r="8" fill="#b06bff"/><text x="240" y="288" font-size="9" text-anchor="middle">🌫</text>

  <!-- 图例 -->
  <g transform="translate(24,410)">
    <circle cx="6" cy="0" r="6" fill="#3ba9ff"/><text x="18" y="4" fill="#a99fd6" font-size="11">任务点</text>
    <circle cx="92" cy="0" r="6" fill="#ff5470"/><text x="104" y="4" fill="#a99fd6" font-size="11">刀点</text>
    <circle cx="156" cy="0" r="6" fill="#b06bff"/><text x="168" y="4" fill="#a99fd6" font-size="11">盲区</text>
    <circle cx="222" cy="0" r="6" fill="#ffd84e"/><text x="234" y="4" fill="#a99fd6" font-size="11">通风口</text>
    <circle cx="300" cy="0" r="6" fill="#4ade80"/><text x="312" y="4" fill="#a99fd6" font-size="11">会议按钮</text>
    <circle cx="392" cy="0" r="6" fill="#fb923c"/><text x="404" y="4" fill="#a99fd6" font-size="11">陷阱/危险</text>
  </g>
</svg>
