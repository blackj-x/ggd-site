<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e2150"/>
      <stop offset="1" stop-color="#251b42"/>
    </linearGradient>
    <linearGradient id="hall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241b42"/>
      <stop offset="1" stop-color="#1d1636"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rm{fill:url(#room);stroke:#4f3f7e;stroke-width:1.5;rx:14}
      .hl{fill:url(#hall);stroke:#3c3164;stroke-width:1.2}
      .rname{fill:#d8d0ff;font-size:15px;font-weight:700;text-anchor:middle}
      .ren{fill:#8b81b8;font-size:10px;text-anchor:middle}
      .conn{stroke:#3c3164;stroke-width:6;fill:none;stroke-linecap:round}
      .pin-label{fill:#f3f0ff;font-size:11px;font-weight:700}
      .pin-bg{fill:#1d1636;stroke-width:1;opacity:.92;rx:5}
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="460" fill="#151229"/>
  <text x="24" y="34" fill="#f3f0ff" font-size="20" font-weight="900">血港 · 区域示意图</text>
  <text x="24" y="52" fill="#a99fd6" font-size="12">Bloodhaven · 环形小镇动线 · 教堂居中 · 原创示意图（非游戏截图）</text>

  <!-- 连接通道（先画，压在房间下层） -->
  <path class="conn" d="M150 116 L150 150"/>      <!-- 小巷-公园 -->
  <path class="conn" d="M400 116 L400 150"/>      <!-- 小巷-广场 -->
  <path class="conn" d="M575 116 L575 150"/>      <!-- 小巷-停尸房 -->
  <path class="conn" d="M720 116 L720 150"/>      <!-- 小巷-药剂师铺 -->
  <path class="conn" d="M220 186 L330 186"/>      <!-- 公园-广场 -->
  <path class="conn" d="M150 222 L150 275"/>      <!-- 公园-医院（左侧街道） -->
  <path class="conn" d="M400 212 L400 240"/>      <!-- 广场-教堂 -->
  <path class="conn" d="M470 181 L505 181"/>      <!-- 广场-停尸房 -->
  <path class="conn" d="M645 186 L665 186"/>      <!-- 停尸房-药剂师铺 -->
  <path class="conn" d="M730 222 L700 265"/>      <!-- 药剂师铺-墓地（右侧通道） -->
  <path class="conn" d="M485 300 L565 300"/>      <!-- 教堂-墓地 -->
  <path class="conn" d="M315 322 L245 322"/>      <!-- 教堂-医院（底部街道） -->
  <path class="conn" d="M200 370 L200 390 L660 390 L660 360"/> <!-- 医院-墓地（底部环街） -->

  <!-- 房间 -->
  <!-- 罪恶小巷（顶部横贯） -->
  <rect class="rm" x="70" y="72" width="660" height="44"/>
  <text class="rname" x="400" y="92">罪恶小巷</text>
  <text class="ren" x="400" y="107">Crime Alley</text>
  <text class="ren" x="118" y="100">⛲ 水井·修泵处</text>
  <!-- 城镇公园 -->
  <rect class="rm" x="80" y="150" width="140" height="72"/>
  <text class="rname" x="150" y="180">城镇公园</text>
  <text class="ren" x="150" y="198">Town Park</text>
  <!-- 广场 -->
  <rect class="rm" x="330" y="150" width="140" height="62"/>
  <text class="rname" x="400" y="176">广场</text>
  <text class="ren" x="400" y="194">Plaza</text>
  <!-- 停尸房 -->
  <rect class="rm" x="505" y="150" width="140" height="72" fill="#34243f" stroke="#6e4a62"/>
  <text class="rname" x="575" y="177">停尸房</text>
  <text class="ren" x="575" y="195">Morgue · 火炉销尸</text>
  <!-- 药剂师铺 -->
  <rect class="rm" x="665" y="150" width="110" height="72"/>
  <text class="rname" x="720" y="177">药剂师铺</text>
  <text class="ren" x="720" y="195">Apothecary</text>
  <!-- 教堂（中央，敲钟会议） -->
  <rect class="rm" x="315" y="240" width="170" height="105" fill="#322761" stroke="#5e4fa3"/>
  <text class="rname" x="400" y="278">教堂</text>
  <text class="ren" x="400" y="296">Chapel · Bell 敲钟会议</text>
  <text x="400" y="314" fill="#ff8fa3" font-size="10" text-anchor="middle">夜晚 / 腐化状态不可敲钟</text>
  <!-- 墓地 -->
  <rect class="rm" x="565" y="265" width="160" height="95" fill="#34243f" stroke="#6e4a62"/>
  <text class="rname" x="645" y="302">墓地</text>
  <text class="ren" x="645" y="320">Cemetery · 献祭之钟</text>
  <!-- 医院 -->
  <rect class="rm" x="95" y="275" width="150" height="95"/>
  <text class="rname" x="170" y="312">医院</text>
  <text class="ren" x="170" y="330">Hospital · 衣柜藏尸</text>

  <!-- ===== 标注点（坐标 = 数据中 x%,y% × 800/460）===== -->
  <!-- meeting 教堂敲钟 50,71.7 -->
  <g filter="url(#glow)"><circle cx="400" cy="330" r="9" fill="#4ade80"/><text x="400" y="334" font-size="10" text-anchor="middle">🔔</text></g>
  <!-- task 广场 44.4,39.3 -->
  <circle cx="355" cy="181" r="8" fill="#3ba9ff"/><text x="355" y="184" font-size="9" text-anchor="middle">📋</text>
  <!-- dispose 停尸房火炉 71.9,45.7 -->
  <g filter="url(#glow)"><circle cx="575" cy="210" r="8" fill="#34d2c8"/><text x="575" y="213" font-size="9" text-anchor="middle">🔥</text></g>
  <!-- dispose 医院衣柜 21.3,76 -->
  <g filter="url(#glow)"><circle cx="170" cy="350" r="8" fill="#34d2c8"/><text x="170" y="353" font-size="9" text-anchor="middle">⚰</text></g>
  <!-- hazard 毒化水泵 25,20.4 -->
  <g filter="url(#glow)"><circle cx="200" cy="94" r="9" fill="#fb923c"/><text x="200" y="98" font-size="10" text-anchor="middle">⚠</text></g>
  <!-- hazard 献祭之钟 80.6,73.5 -->
  <g filter="url(#glow)"><circle cx="645" cy="338" r="9" fill="#fb923c"/><text x="645" y="342" font-size="10" text-anchor="middle">⚠</text></g>
  <!-- killspot 药剂师铺 90,46.1 -->
  <g filter="url(#glow)"><circle cx="720" cy="212" r="9" fill="#ff5470"/><text x="720" y="216" font-size="10" text-anchor="middle">🔪</text></g>
  <!-- blindspot 城镇公园 13.5,44.6 -->
  <circle cx="108" cy="205" r="8" fill="#b06bff"/><text x="108" y="208" font-size="9" text-anchor="middle">🌫</text>

  <!-- 图例 -->
  <g transform="translate(24,412)">
    <circle cx="6" cy="0" r="6" fill="#3ba9ff"/><text x="18" y="4" fill="#a99fd6" font-size="11">任务点</text>
    <circle cx="92" cy="0" r="6" fill="#ff5470"/><text x="104" y="4" fill="#a99fd6" font-size="11">刀点</text>
    <circle cx="156" cy="0" r="6" fill="#b06bff"/><text x="168" y="4" fill="#a99fd6" font-size="11">盲区</text>
    <circle cx="222" cy="0" r="6" fill="#34d2c8"/><text x="234" y="4" fill="#a99fd6" font-size="11">藏尸点</text>
    <circle cx="300" cy="0" r="6" fill="#4ade80"/><text x="312" y="4" fill="#a99fd6" font-size="11">会议敲钟</text>
    <circle cx="392" cy="0" r="6" fill="#fb923c"/><text x="404" y="4" fill="#a99fd6" font-size="11">破坏/危险</text>
    <text x="478" y="4" fill="#6e648f" font-size="11">※ 本图无通风口、无监狱（血港特性）</text>
  </g>
</svg>
