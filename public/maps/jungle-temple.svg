<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#24363b"/>
      <stop offset="1" stop-color="#1d2c35"/>
    </linearGradient>
    <linearGradient id="hall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2c30"/>
      <stop offset="1" stop-color="#182428"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rm{fill:url(#room);stroke:#3f7a66;stroke-width:1.5;rx:14}
      .hl{fill:url(#hall);stroke:#2f5a4c;stroke-width:1.2}
      .rname{fill:#d8d0ff;font-size:15px;font-weight:700;text-anchor:middle}
      .ren{fill:#8b81b8;font-size:10px;text-anchor:middle}
      .conn{stroke:#2f5a4c;stroke-width:6;fill:none;stroke-linecap:round}
      .pin-label{fill:#f3f0ff;font-size:11px;font-weight:700}
      .pin-bg{fill:#1c1838;stroke-width:1;opacity:.92;rx:5}
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="460" fill="#151229"/>
  <text x="24" y="34" fill="#f3f0ff" font-size="20" font-weight="900">丛林神庙 · 区域示意图</text>
  <text x="24" y="52" fill="#a99fd6" font-size="12">Jungle Temple · 北墓室—中敬拜坑—东暂存区动线 · 原创示意图（非游戏截图）</text>

  <!-- 连接通道（先画，压在房间下层） -->
  <path class="conn" d="M375 85 L375 60"/>        <!-- 墓室-北入口（迷雾） -->
  <path class="conn" d="M375 165 L375 210"/>      <!-- 墓室-敬拜坑 -->
  <path class="conn" d="M450 210 L585 162"/>      <!-- 敬拜坑-王座室（木桥） -->
  <path class="conn" d="M220 248 L300 252"/>      <!-- 训练场-敬拜坑（可破坏的门） -->
  <path class="conn" d="M470 262 L495 262"/>      <!-- 敬拜坑-滚石通道 -->
  <path class="conn" d="M595 262 L615 262"/>      <!-- 滚石通道-暂存准备区 -->
  <path class="conn" d="M775 258 L798 258"/>      <!-- 暂存准备区-东入口（迷雾） -->
  <path class="conn" d="M385 310 L385 350"/>      <!-- 敬拜坑-下水道 -->

  <!-- 房间 -->
  <!-- 墓室 -->
  <rect class="rm" x="300" y="85" width="150" height="80"/>
  <text class="rname" x="375" y="120">墓室</text>
  <text class="ren" x="375" y="138">Burial Chamber</text>
  <!-- 王座室 -->
  <rect class="rm" x="530" y="78" width="170" height="84"/>
  <text class="rname" x="615" y="112">王座室</text>
  <text class="ren" x="615" y="130">Throne Room · 木桥</text>
  <!-- 训练场 -->
  <rect class="rm" x="70" y="205" width="150" height="85"/>
  <text class="rname" x="145" y="238">训练场</text>
  <text class="ren" x="145" y="256">Training Grounds</text>
  <!-- 敬拜坑（中央核心，会议按钮） -->
  <rect class="rm" x="300" y="210" width="170" height="100" fill="#28443c" stroke="#5fa080"/>
  <text class="rname" x="385" y="245">敬拜坑</text>
  <text class="ren" x="385" y="263">Pit of Worship · 献祭钟</text>
  <!-- 滚石通道 -->
  <rect class="hl" x="495" y="238" width="100" height="48"/>
  <text class="ren" x="545" y="254">滚石通道</text>
  <!-- 暂存准备区 -->
  <rect class="rm" x="615" y="212" width="160" height="92"/>
  <text class="rname" x="695" y="248">暂存准备区</text>
  <text class="ren" x="695" y="266">Staging Area · 东入口</text>
  <!-- 下水道 -->
  <rect class="hl" x="320" y="350" width="130" height="44"/>
  <text class="ren" x="398" y="376">下水道 Sewers</text>

  <!-- 木桥小标签 -->
  <rect class="pin-bg" x="478" y="160" width="34" height="16" stroke="#3f7a66"/>
  <text class="pin-label" x="484" y="172" font-size="10">木桥</text>

  <!-- ===== 标注点（坐标 = 数据中 x%,y% × 800/460）===== -->
  <!-- meeting 献祭钟 48.1,62.6 -->
  <g filter="url(#glow)"><circle cx="385" cy="288" r="9" fill="#4ade80"/><text x="385" y="292" font-size="10" text-anchor="middle">🔔</text></g>
  <!-- hazard 滚石通道 68.1,59.1 -->
  <g filter="url(#glow)"><circle cx="545" cy="272" r="10" fill="#fb923c"/><text x="545" y="276" font-size="11" text-anchor="middle">⚠</text></g>
  <!-- hide 北口迷雾 46.9,15.2 -->
  <circle cx="375" cy="70" r="8" fill="#2dd4bf"/><text x="375" y="73" font-size="9" text-anchor="middle">🌫</text>
  <!-- blindspot 召唤黑暗 41.3,33.0 -->
  <circle cx="330" cy="152" r="8" fill="#b06bff"/><text x="330" y="155" font-size="9" text-anchor="middle">🌑</text>
  <!-- hazard 木桥 64.6,40.4 -->
  <g filter="url(#glow)"><circle cx="517" cy="186" r="10" fill="#fb923c"/><text x="517" y="190" font-size="11" text-anchor="middle">⚠</text></g>
  <!-- killspot 训练场 18.1,60.4 -->
  <g filter="url(#glow)"><circle cx="145" cy="278" r="9" fill="#ff5470"/><text x="145" y="282" font-size="10" text-anchor="middle">🔪</text></g>
  <!-- hide 东口迷雾 95.0,56.0 -->
  <circle cx="760" cy="258" r="8" fill="#2dd4bf"/><text x="760" y="261" font-size="9" text-anchor="middle">🌫</text>
  <!-- hide 下水道 41.9,80.9 -->
  <circle cx="335" cy="372" r="8" fill="#2dd4bf"/><text x="335" y="375" font-size="9" text-anchor="middle">🌫</text>
  <!-- vent 王座室 75.0,32.2 -->
  <g filter="url(#glow)"><circle cx="600" cy="148" r="8" fill="#ffd84e"/><text x="600" y="151" font-size="9" text-anchor="middle">🕳</text></g>

  <!-- 图例 -->
  <g transform="translate(24,428)">
    <circle cx="6" cy="0" r="6" fill="#4ade80"/><text x="18" y="4" fill="#a99fd6" font-size="11">会议按钮</text>
    <circle cx="92" cy="0" r="6" fill="#ff5470"/><text x="104" y="4" fill="#a99fd6" font-size="11">刀点</text>
    <circle cx="156" cy="0" r="6" fill="#b06bff"/><text x="168" y="4" fill="#a99fd6" font-size="11">盲区</text>
    <circle cx="222" cy="0" r="6" fill="#ffd84e"/><text x="234" y="4" fill="#a99fd6" font-size="11">通风口</text>
    <circle cx="300" cy="0" r="6" fill="#2dd4bf"/><text x="312" y="4" fill="#a99fd6" font-size="11">迷雾/藏身</text>
    <circle cx="392" cy="0" r="6" fill="#fb923c"/><text x="404" y="4" fill="#a99fd6" font-size="11">陷阱/危险</text>
  </g>
</svg>
