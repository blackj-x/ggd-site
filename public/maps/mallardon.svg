<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#27305a"/>
      <stop offset="1" stop-color="#1f2648"/>
    </linearGradient>
    <linearGradient id="hall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2444"/>
      <stop offset="1" stop-color="#191e38"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rm{fill:url(#room);stroke:#46568e;stroke-width:1.5;rx:14}
      .hl{fill:url(#hall);stroke:#36406e;stroke-width:1.2}
      .rname{fill:#d8d0ff;font-size:15px;font-weight:700;text-anchor:middle}
      .ren{fill:#8b81b8;font-size:10px;text-anchor:middle}
      .conn{stroke:#36406e;stroke-width:6;fill:none;stroke-linecap:round}
      .pin-label{fill:#f3f0ff;font-size:11px;font-weight:700}
      .pin-bg{fill:#1c1838;stroke-width:1;opacity:.92;rx:5}
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="460" fill="#151229"/>
  <text x="24" y="34" fill="#f3f0ff" font-size="20" font-weight="900">哥斯拉镇 · 区域示意图</text>
  <text x="24" y="52" fill="#a99fd6" font-size="12">Mallardon · 开放式海滨街区，露天街道互通 · 原创示意图（非游戏截图）</text>

  <!-- 左侧海域 -->
  <rect x="0" y="64" width="26" height="340" fill="#1a2a4a" opacity="0.85"/>
  <text x="13" y="250" fill="#5d76a8" font-size="11" text-anchor="middle">海</text>

  <!-- 连接通道（先画，压在房间下层） -->
  <path class="conn" d="M135 152 L165 135"/>                       <!-- 栈桥-百货 -->
  <path class="conn" d="M250 170 L315 212"/>                       <!-- 百货-街道 -->
  <path class="conn" d="M290 268 L315 230"/>                       <!-- 对策中心-街道 -->
  <path class="conn" d="M372 170 L372 212"/>                       <!-- 咖啡店-街道 -->
  <path class="conn" d="M530 170 L530 212"/>                       <!-- 拉面店-街道 -->
  <path class="conn" d="M655 190 L605 226"/>                       <!-- 蓝盒-街道 -->
  <path class="conn" d="M367 285 L367 252"/>                       <!-- 寿司店-街道 -->
  <path class="conn" d="M477 285 L477 252"/>                       <!-- 酒吧-街道 -->
  <path class="conn" d="M597 285 L597 252"/>                       <!-- 柏青哥-街道 -->
  <path class="conn" d="M678 300 L606 246"/>                       <!-- 便利店-街道 -->
  <path class="conn" d="M675 240 L606 236"/>                       <!-- 漫画店-街道 -->
  <path class="conn" d="M115 345 L200 318"/>                       <!-- 民居-对策中心 -->
  <!-- 百货被毁后瓦砾连通蓝盒研究所（虚线） -->
  <path class="conn" d="M285 110 C420 72 560 70 650 96" stroke-dasharray="4 7" stroke-width="3"/>
  <text x="455" y="74" fill="#8b81b8" font-size="10" text-anchor="middle">百货被热线击毁后 · 瓦砾通路</text>

  <!-- 房间 -->
  <!-- 海边栈桥 -->
  <rect class="rm" x="40" y="120" width="95" height="64"/>
  <text class="rname" x="87" y="146">海边栈桥</text>
  <text class="ren" x="87" y="161">Coastal Pier</text>
  <!-- 百货商店 -->
  <rect class="rm" x="160" y="100" width="125" height="70"/>
  <text class="rname" x="222" y="130">百货商店</text>
  <text class="ren" x="222" y="147">Department Store</text>
  <!-- 咖啡店 -->
  <rect class="rm" x="320" y="100" width="105" height="70"/>
  <text class="rname" x="372" y="130">咖啡店</text>
  <text class="ren" x="372" y="147">Cafe</text>
  <!-- 拉面店 -->
  <rect class="rm" x="480" y="100" width="100" height="70"/>
  <text class="rname" x="530" y="130">拉面店</text>
  <text class="ren" x="530" y="147">Ramen Shop</text>
  <!-- 蓝盒研究所 -->
  <rect class="rm" x="635" y="95" width="140" height="95" fill="#2a3560" stroke="#5b6bb0"/>
  <text class="rname" x="705" y="128">蓝盒研究所</text>
  <text class="ren" x="705" y="144">Blue Box Lab · 断电触发</text>
  <text x="668" y="182" fill="#8b81b8" font-size="9" text-anchor="middle">望远镜</text>
  <!-- 中央街道 -->
  <rect class="hl" x="300" y="210" width="310" height="42"/>
  <text class="ren" x="455" y="235">中央街道（露天互通）</text>
  <!-- 对策中心 -->
  <rect class="rm" x="160" y="240" width="135" height="78" fill="#23404a" stroke="#3f7a72"/>
  <text class="rname" x="227" y="270">对策中心</text>
  <text class="ren" x="227" y="286">Response Center · 黑板关门</text>
  <!-- 寿司店 -->
  <rect class="rm" x="320" y="285" width="95" height="62"/>
  <text class="rname" x="367" y="311">寿司店</text>
  <text class="ren" x="367" y="327">Sushi Bar</text>
  <!-- 酒吧 -->
  <rect class="rm" x="435" y="285" width="85" height="62"/>
  <text class="rname" x="477" y="311">酒吧</text>
  <text class="ren" x="477" y="327">Bar</text>
  <!-- 柏青哥厅 -->
  <rect class="rm" x="540" y="285" width="115" height="62"/>
  <text class="rname" x="597" y="311">柏青哥厅</text>
  <text class="ren" x="597" y="327">Pachinko</text>
  <!-- 便利店 -->
  <rect class="rm" x="675" y="285" width="100" height="62"/>
  <text class="rname" x="725" y="311">便利店</text>
  <text class="ren" x="725" y="327">Convenience</text>
  <!-- 漫画店 -->
  <rect class="rm" x="675" y="210" width="100" height="62"/>
  <text class="rname" x="725" y="236">漫画店</text>
  <text class="ren" x="725" y="252">Comic Shop</text>
  <!-- 民居区 -->
  <rect class="rm" x="40" y="345" width="140" height="50"/>
  <text class="rname" x="110" y="366">民居区 ×5</text>
  <text class="ren" x="110" y="382">Residences · 电脑10-14</text>
  <!-- 汽车（垃圾破坏点） -->
  <text x="660" y="206" fill="#8b81b8" font-size="9">🚗 汽车 · 垃圾触发点</text>
  <!-- 天坑文字 -->
  <text x="430" y="396" fill="#8b81b8" font-size="9" text-anchor="middle">天坑 · 随机出现</text>

  <!-- ===== 标注点（坐标 = 数据中 x%,y% × 800/460）===== -->
  <!-- meeting 会议按钮 18.8,50.4 -->
  <g filter="url(#glow)"><circle cx="150" cy="232" r="9" fill="#4ade80"/><text x="150" y="236" font-size="10" text-anchor="middle">🔔</text></g>
  <!-- task 对策电脑 31.9,65.2 -->
  <circle cx="255" cy="300" r="8" fill="#3ba9ff"/><text x="255" y="303" font-size="9" text-anchor="middle">📋</text>
  <!-- task 栈桥钓鱼 10.9,38.3 -->
  <circle cx="87" cy="176" r="8" fill="#3ba9ff"/><text x="87" y="179" font-size="9" text-anchor="middle">📋</text>
  <!-- task 电线杆修电 56.5,29.6 -->
  <circle cx="452" cy="136" r="8" fill="#3ba9ff"/><text x="452" y="139" font-size="9" text-anchor="middle">📋</text>
  <text x="452" y="160" fill="#8b81b8" font-size="9" text-anchor="middle">电线杆</text>
  <!-- killspot 望远镜角落 81.3,36.5 -->
  <g filter="url(#glow)"><circle cx="650" cy="168" r="9" fill="#ff5470"/><text x="650" y="172" font-size="10" text-anchor="middle">🔪</text></g>
  <!-- hazard 怪兽热线 7.5,20.7 -->
  <g filter="url(#glow)"><circle cx="60" cy="95" r="10" fill="#fb923c"/><text x="60" y="99" font-size="11" text-anchor="middle">⚠</text></g>
  <text x="76" y="99" fill="#fb923c" font-size="10">怪兽热线（海中现身）</text>
  <!-- dispose 天坑 53.8,81.5 -->
  <g filter="url(#glow)"><circle cx="430" cy="375" r="9" fill="#2dd4bf"/><text x="430" y="379" font-size="10" text-anchor="middle">🕳</text></g>
  <!-- blindspot 外围街区 93.1,57.2 -->
  <circle cx="745" cy="263" r="8" fill="#b06bff"/><text x="745" y="266" font-size="9" text-anchor="middle">🌫</text>

  <!-- 图例 -->
  <g transform="translate(24,432)">
    <circle cx="6" cy="0" r="6" fill="#3ba9ff"/><text x="18" y="4" fill="#a99fd6" font-size="11">任务点</text>
    <circle cx="92" cy="0" r="6" fill="#ff5470"/><text x="104" y="4" fill="#a99fd6" font-size="11">刀点</text>
    <circle cx="156" cy="0" r="6" fill="#b06bff"/><text x="168" y="4" fill="#a99fd6" font-size="11">盲区</text>
    <circle cx="222" cy="0" r="6" fill="#4ade80"/><text x="234" y="4" fill="#a99fd6" font-size="11">会议按钮</text>
    <circle cx="314" cy="0" r="6" fill="#fb923c"/><text x="326" y="4" fill="#a99fd6" font-size="11">怪兽热线</text>
    <circle cx="406" cy="0" r="6" fill="#2dd4bf"/><text x="418" y="4" fill="#a99fd6" font-size="11">天坑毁尸</text>
  </g>
</svg>
