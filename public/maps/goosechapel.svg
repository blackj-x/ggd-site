<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2350"/>
      <stop offset="1" stop-color="#211c42"/>
    </linearGradient>
    <linearGradient id="hall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221d44"/>
      <stop offset="1" stop-color="#1c1838"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rm{fill:url(#room);stroke:#4a3f80;stroke-width:1.5;rx:14}
      .hl{fill:url(#hall);stroke:#3a3266;stroke-width:1.2}
      .rname{fill:#d8d0ff;font-size:15px;font-weight:700;text-anchor:middle}
      .ren{fill:#8b81b8;font-size:10px;text-anchor:middle}
      .conn{stroke:#3a3266;stroke-width:6;fill:none;stroke-linecap:round}
      .sewer{stroke:#8a7a3a;stroke-width:1.5;fill:none;stroke-dasharray:4 5;opacity:.5}
      .pin-label{fill:#f3f0ff;font-size:11px;font-weight:700}
      .pin-bg{fill:#1c1838;stroke-width:1;opacity:.92;rx:5}
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="460" fill="#151229"/>
  <!-- 南侧水岸 -->
  <rect x="0" y="400" width="800" height="60" fill="#131a30"/>
  <text x="700" y="448" fill="#3f5278" font-size="11" text-anchor="middle">南侧水岸 · Waterfront</text>

  <text x="24" y="34" fill="#f3f0ff" font-size="20" font-weight="900">鹅教堂 · 区域示意图</text>
  <text x="24" y="52" fill="#a99fd6" font-size="12">Goosechapel · 上层动线 工厂—广场—红灯区 · 原创示意图（非游戏截图）</text>

  <!-- 下水道暗线（7 口互通，虚线） -->
  <path class="sewer" d="M170 145 L110 215 L330 335 L545 340"/>
  <path class="sewer" d="M510 95 L352 195 L330 335"/>
  <path class="sewer" d="M728 175 L545 340"/>

  <!-- 连接通道（先画，压在房间下层） -->
  <path class="conn" d="M195 118 L385 118"/>      <!-- 工厂-老酒馆-广场主街 -->
  <path class="conn" d="M550 120 L585 120"/>      <!-- 广场-银行 -->
  <path class="conn" d="M550 150 L685 175"/>      <!-- 广场-红灯区 -->
  <path class="conn" d="M455 168 L445 200"/>      <!-- 广场-法院 -->
  <path class="conn" d="M510 240 L540 240"/>      <!-- 法院-市长办公室 -->
  <path class="conn" d="M370 258 L220 258"/>      <!-- 法院-警察局 -->
  <path class="conn" d="M150 272 L150 285"/>      <!-- 警察局-监狱 -->
  <path class="conn" d="M280 190 L280 163"/>      <!-- 理发店-老酒馆 -->
  <path class="conn" d="M75 163 L75 355 L190 355"/><!-- 工厂-仓库 -->
  <path class="conn" d="M355 357 L400 357"/>      <!-- 仓库-码头 -->
  <path class="conn" d="M570 352 L725 330"/>      <!-- 码头-红灯区 -->

  <!-- 房间 -->
  <!-- 工厂 -->
  <rect class="rm" x="60" y="85" width="135" height="78"/>
  <text class="rname" x="127" y="120">工厂</text>
  <text class="ren" x="127" y="138">Factory · 浓雾破坏</text>
  <!-- 老酒馆 -->
  <rect class="rm" x="225" y="95" width="120" height="68"/>
  <text class="rname" x="285" y="125">老酒馆</text>
  <text class="ren" x="285" y="143">Old Tavern</text>
  <!-- 广场 -->
  <rect class="rm" x="385" y="80" width="165" height="88"/>
  <text class="rname" x="467" y="120">广场</text>
  <text class="ren" x="467" y="138">Plaza · 下毒破坏</text>
  <!-- 银行 -->
  <rect class="rm" x="585" y="95" width="95" height="62"/>
  <text class="rname" x="632" y="123">银行</text>
  <text class="ren" x="632" y="141">Bank</text>
  <!-- 红灯区（右侧纵深） -->
  <rect class="rm" x="685" y="85" width="90" height="245"/>
  <text class="rname" x="730" y="195">红灯区</text>
  <text class="ren" x="730" y="213">Red Light</text>
  <text x="730" y="231" fill="#ff8fa3" font-size="10" text-anchor="middle">关门破坏点</text>
  <!-- 警察局 -->
  <rect class="rm" x="95" y="200" width="125" height="72"/>
  <text class="rname" x="157" y="232">警察局</text>
  <text class="ren" x="157" y="250">Police Station</text>
  <!-- 监狱 -->
  <rect class="rm" x="95" y="285" width="90" height="55" fill="#342544" stroke="#6a4a6a"/>
  <text class="rname" x="140" y="305">监狱</text>
  <text class="ren" x="140" y="320">Jail</text>
  <!-- 理发店 -->
  <rect class="rm" x="225" y="190" width="110" height="60"/>
  <text class="rname" x="280" y="216">理发店</text>
  <text class="ren" x="280" y="234">Barbershop</text>
  <!-- 法院（会议拉铃） -->
  <rect class="rm" x="370" y="200" width="140" height="80" fill="#2f2860" stroke="#5b4fa0"/>
  <text class="rname" x="440" y="235">法院</text>
  <text class="ren" x="440" y="253">Courthouse · 会议拉铃</text>
  <!-- 市长办公室 -->
  <rect class="rm" x="540" y="210" width="130" height="62"/>
  <text class="rname" x="605" y="237">市长办公室</text>
  <text class="ren" x="605" y="255">Mayor's Office</text>
  <!-- 仓库 -->
  <rect class="rm" x="190" y="320" width="165" height="70"/>
  <text class="rname" x="272" y="350">仓库</text>
  <text class="ren" x="272" y="368">Warehouse · 火灾破坏</text>
  <!-- 码头 -->
  <rect class="rm" x="400" y="325" width="170" height="65"/>
  <text class="rname" x="485" y="352">码头</text>
  <text class="ren" x="485" y="370">Docks · 钓鱼任务</text>

  <!-- 下水道小口（装饰，与暗线相连） -->
  <circle cx="170" cy="145" r="4.5" fill="#1c1838" stroke="#ffd84e" stroke-width="1.2" opacity=".8"/>
  <circle cx="510" cy="95" r="4.5" fill="#1c1838" stroke="#ffd84e" stroke-width="1.2" opacity=".8"/>
  <circle cx="110" cy="215" r="4.5" fill="#1c1838" stroke="#ffd84e" stroke-width="1.2" opacity=".8"/>
  <circle cx="352" cy="195" r="4.5" fill="#1c1838" stroke="#ffd84e" stroke-width="1.2" opacity=".8"/>
  <circle cx="330" cy="335" r="4.5" fill="#1c1838" stroke="#ffd84e" stroke-width="1.2" opacity=".8"/>
  <circle cx="545" cy="340" r="4.5" fill="#1c1838" stroke="#ffd84e" stroke-width="1.2" opacity=".8"/>

  <!-- ===== 标注点（坐标 = 数据中 x%,y% × 800/460）===== -->
  <!-- meeting 法院 50,58 -->
  <g filter="url(#glow)"><circle cx="400" cy="267" r="9" fill="#4ade80"/><text x="400" y="271" font-size="10" text-anchor="middle">🔔</text></g>
  <!-- jail 监狱 16,72 -->
  <g filter="url(#glow)"><circle cx="128" cy="331" r="8" fill="#94a3b8"/><text x="128" y="334" font-size="9" text-anchor="middle">🔒</text></g>
  <!-- hazard 广场下毒 53,24 -->
  <g filter="url(#glow)"><circle cx="424" cy="110" r="9" fill="#fb923c"/><text x="424" y="114" font-size="10" text-anchor="middle">⚠</text></g>
  <!-- hazard 工厂浓雾 12,24 -->
  <g filter="url(#glow)"><circle cx="96" cy="110" r="9" fill="#fb923c"/><text x="96" y="114" font-size="10" text-anchor="middle">⚠</text></g>
  <!-- hazard 仓库火灾 28,73 -->
  <g filter="url(#glow)"><circle cx="224" cy="336" r="9" fill="#fb923c"/><text x="224" y="340" font-size="10" text-anchor="middle">⚠</text></g>
  <!-- vent 红灯区下水道 91,36 -->
  <g filter="url(#glow)"><circle cx="728" cy="166" r="8" fill="#ffd84e"/><text x="728" y="169" font-size="9" text-anchor="middle">🕳</text></g>
  <!-- killspot 码头 65,74 -->
  <g filter="url(#glow)"><circle cx="520" cy="340" r="9" fill="#ff5470"/><text x="520" y="344" font-size="10" text-anchor="middle">🔪</text></g>
  <!-- blindspot 街巷 44,50 -->
  <circle cx="352" cy="230" r="8" fill="#b06bff"/><path d="M347 227h10M347 230.5h10M349 234h7" stroke="#fff" stroke-width="1.4" stroke-linecap="round" fill="none"/>

  <!-- 图例 -->
  <g transform="translate(24,430)">
    <circle cx="6" cy="0" r="6" fill="#ff5470"/><text x="18" y="4" fill="#a99fd6" font-size="11">刀点</text>
    <circle cx="70" cy="0" r="6" fill="#b06bff"/><text x="82" y="4" fill="#a99fd6" font-size="11">盲区</text>
    <circle cx="134" cy="0" r="6" fill="#ffd84e"/><text x="146" y="4" fill="#a99fd6" font-size="11">下水道×7</text>
    <circle cx="220" cy="0" r="6" fill="#4ade80"/><text x="232" y="4" fill="#a99fd6" font-size="11">会议拉铃</text>
    <circle cx="306" cy="0" r="6" fill="#fb923c"/><text x="318" y="4" fill="#a99fd6" font-size="11">破坏点</text>
    <circle cx="378" cy="0" r="6" fill="#94a3b8"/><text x="390" y="4" fill="#a99fd6" font-size="11">监狱</text>
  </g>
</svg>
