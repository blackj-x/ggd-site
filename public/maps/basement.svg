<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2350"/>
      <stop offset="1" stop-color="#221c42"/>
    </linearGradient>
    <linearGradient id="hall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221d44"/>
      <stop offset="1" stop-color="#1c1838"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rm{fill:url(#room);stroke:#4a3f80;stroke-width:1.5;rx:14}
      .hl{fill:url(#hall);stroke:#3a3266;stroke-width:1.2}
      .rname{fill:#d8d0ff;font-size:15px;font-weight:700;text-anchor:middle}
      .ren{fill:#8b81b8;font-size:10px;text-anchor:middle}
      .conn{stroke:#3a3266;stroke-width:6;fill:none;stroke-linecap:round}
      .pin-label{fill:#f3f0ff;font-size:11px;font-weight:700}
      .pin-bg{fill:#1c1838;stroke-width:1;opacity:.92;rx:5}
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="460" fill="#151229"/>
  <text x="24" y="34" fill="#f3f0ff" font-size="20" font-weight="900">地下室 · 区域示意图</text>
  <text x="24" y="52" fill="#a99fd6" font-size="12">Basement · 野鸭庄园地下层 · 中央祭坛辐射四方 · 原创示意图（非游戏截图）</text>

  <!-- 连接通道（先画，压在房间下层） -->
  <path class="conn" d="M120 150 L120 172"/>      <!-- 水域-雾洞 -->
  <path class="conn" d="M178 200 L222 200"/>      <!-- 雾洞-实验室 -->
  <path class="conn" d="M115 230 L115 292"/>      <!-- 雾洞-坑 -->
  <path class="conn" d="M168 330 L212 362"/>      <!-- 坑-隧道 -->
  <path class="conn" d="M335 210 L360 218"/>      <!-- 实验室-祭坛 -->
  <path class="conn" d="M400 152 L400 203"/>      <!-- 礼堂-祭坛 -->
  <path class="conn" d="M430 268 L430 312"/>      <!-- 祭坛-锅炉房 -->
  <path class="conn" d="M495 332 L572 320"/>      <!-- 锅炉房-储物间下层 -->
  <path class="conn" d="M640 295 L650 252"/>      <!-- 储物间下-上层 -->
  <path class="conn" d="M638 200 L615 162"/>      <!-- 储物间上层-书房 -->
  <path class="conn" d="M672 118 L692 110"/>      <!-- 书房-收藏室 -->
  <path class="conn" d="M465 122 L552 122"/>      <!-- 礼堂-书房 -->

  <!-- 房间 -->
  <!-- 水域（雾洞上方，毁尸点） -->
  <rect class="hl" x="70" y="112" width="110" height="40" fill="#1d2a45" stroke="#3c5a86"/>
  <text class="ren" x="135" y="136" fill="#7fa3d0">水域 · 毁尸</text>
  <!-- 雾洞 -->
  <rect class="rm" x="55" y="165" width="130" height="72" fill="#243049" stroke="#46618c"/>
  <text class="rname" x="120" y="197">雾洞</text>
  <text class="ren" x="120" y="215">Foggy Cave · 千里眼</text>
  <!-- 坑 -->
  <rect class="rm" x="60" y="285" width="115" height="66"/>
  <text class="rname" x="117" y="314">坑</text>
  <text class="ren" x="117" y="332">The Pit · 找铃铛</text>
  <!-- 隧道（迷宫） -->
  <rect class="hl" x="195" y="345" width="150" height="48"/>
  <path d="M210 355 h30 v12 h25 m20 -12 v20 h28" stroke="#2c2754" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <text class="rname" x="260" y="368" font-size="13">隧道（迷宫）</text>
  <text class="ren" x="260" y="384">Tunnel · 随机落点</text>
  <!-- 实验室 -->
  <rect class="rm" x="215" y="160" width="130" height="70"/>
  <text class="rname" x="280" y="191">实验室</text>
  <text class="ren" x="280" y="209">Lab · 关灯破坏</text>
  <!-- 礼堂 -->
  <rect class="rm" x="330" y="90" width="140" height="70"/>
  <text class="rname" x="400" y="121">礼堂</text>
  <text class="ren" x="400" y="139">Hall / Auditorium</text>
  <!-- 祭坛（中央，会议拉铃） -->
  <rect class="rm" x="350" y="195" width="140" height="80" fill="#2f2860" stroke="#5b4fa0"/>
  <text class="rname" x="420" y="228">祭坛</text>
  <text class="ren" x="420" y="246">Altar · 会议拉铃</text>
  <!-- 锅炉房 -->
  <rect class="rm" x="370" y="305" width="130" height="68" fill="#382535" stroke="#754a5c"/>
  <text class="rname" x="435" y="336">锅炉房</text>
  <text class="ren" x="435" y="354">Boiler · 火炉毁尸</text>
  <!-- 储物间下层 -->
  <rect class="rm" x="565" y="290" width="130" height="62"/>
  <text class="rname" x="630" y="316">储物间·下层</text>
  <text class="ren" x="630" y="334">Storage · 关门破坏</text>
  <!-- 储物间上层 -->
  <rect class="rm" x="590" y="195" width="130" height="62"/>
  <text class="rname" x="655" y="221">储物间·上层</text>
  <text class="ren" x="655" y="239">Storage Upper</text>
  <!-- 书房 -->
  <rect class="rm" x="545" y="95" width="130" height="70"/>
  <text class="rname" x="610" y="126">书房</text>
  <text class="ren" x="610" y="144">Study · 投喂神明</text>
  <!-- 收藏室 -->
  <rect class="rm" x="685" y="78" width="105" height="58"/>
  <text class="rname" x="737" y="103">收藏室</text>
  <text class="ren" x="737" y="120">Collection</text>

  <!-- ===== 标注点（坐标 = 数据中 x%,y% × 800/460）===== -->
  <!-- meeting 祭坛 52.5,56.9 -->
  <g filter="url(#glow)"><circle cx="420" cy="262" r="9" fill="#4ade80"/><text x="420" y="266" font-size="10" text-anchor="middle">🔔</text></g>
  <!-- task 书房 71.9,23.5 -->
  <circle cx="575" cy="108" r="8" fill="#3ba9ff"/><text x="575" y="111" font-size="9" text-anchor="middle">📋</text>
  <!-- task 坑 11.3,64.8 -->
  <circle cx="90" cy="298" r="8" fill="#3ba9ff"/><text x="90" y="301" font-size="9" text-anchor="middle">📋</text>
  <!-- killspot 隧道 40.9,80.4 -->
  <g filter="url(#glow)"><circle cx="327" cy="370" r="9" fill="#ff5470"/><text x="327" y="374" font-size="10" text-anchor="middle">🔪</text></g>
  <!-- dispose 水域 11.3,28.7 -->
  <g filter="url(#glow)"><circle cx="90" cy="132" r="8" fill="#2dd4bf"/><text x="90" y="135" font-size="9" text-anchor="middle">🌊</text></g>
  <!-- dispose 锅炉房 50,69.1 -->
  <g filter="url(#glow)"><circle cx="400" cy="318" r="8" fill="#2dd4bf"/><text x="400" y="321" font-size="9" text-anchor="middle">🔥</text></g>
  <!-- hide 礼堂 43.5,22.6 -->
  <circle cx="348" cy="104" r="8" fill="#c084fc"/><text x="348" y="107" font-size="9" text-anchor="middle">📦</text>
  <!-- hide 储物间下层 72.5,65.7 -->
  <circle cx="580" cy="302" r="8" fill="#c084fc"/><text x="580" y="305" font-size="9" text-anchor="middle">📦</text>
  <!-- hazard 实验室 30.6,37.4 -->
  <g filter="url(#glow)"><circle cx="245" cy="172" r="9" fill="#fb923c"/><text x="245" y="176" font-size="10" text-anchor="middle">⚠</text></g>

  <!-- 图例 -->
  <g transform="translate(24,432)">
    <circle cx="6" cy="0" r="6" fill="#3ba9ff"/><text x="18" y="4" fill="#a99fd6" font-size="11">任务点</text>
    <circle cx="92" cy="0" r="6" fill="#ff5470"/><text x="104" y="4" fill="#a99fd6" font-size="11">刀点</text>
    <circle cx="156" cy="0" r="6" fill="#2dd4bf"/><text x="168" y="4" fill="#a99fd6" font-size="11">毁尸点</text>
    <circle cx="240" cy="0" r="6" fill="#c084fc"/><text x="252" y="4" fill="#a99fd6" font-size="11">藏身处</text>
    <circle cx="324" cy="0" r="6" fill="#4ade80"/><text x="336" y="4" fill="#a99fd6" font-size="11">会议拉铃</text>
    <circle cx="420" cy="0" r="6" fill="#fb923c"/><text x="432" y="4" fill="#a99fd6" font-size="11">破坏点</text>
  </g>
</svg>
