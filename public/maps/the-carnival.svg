<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans SC',sans-serif">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c2350"/>
      <stop offset="1" stop-color="#241d44"/>
    </linearGradient>
    <linearGradient id="hall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221d44"/>
      <stop offset="1" stop-color="#1c1838"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .rm{fill:url(#room);stroke:#4f3f82;stroke-width:1.5;rx:14}
      .hl{fill:url(#hall);stroke:#3a3266;stroke-width:1.2}
      .rname{fill:#d8d0ff;font-size:15px;font-weight:700;text-anchor:middle}
      .ren{fill:#8b81b8;font-size:10px;text-anchor:middle}
      .conn{stroke:#3a3266;stroke-width:6;fill:none;stroke-linecap:round}
      .pin-label{fill:#f3f0ff;font-size:11px;font-weight:700}
      .pin-bg{fill:#1c1838;stroke-width:1;opacity:.92;rx:5}
      .rail{stroke:#ffb86b;stroke-width:3;fill:none;stroke-linecap:round;stroke-dasharray:7 6;opacity:.75}
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="460" fill="#151229"/>
  <text x="24" y="34" fill="#f3f0ff" font-size="20" font-weight="900">嘉年华 · 区域示意图</text>
  <text x="24" y="52" fill="#a99fd6" font-size="12">The Carnival · 过山车南北直达 · 原创示意图（非游戏截图）</text>

  <!-- 连接通道（先画，压在房间下层） -->
  <path class="conn" d="M405 128 L405 160"/>      <!-- 北站台-北游乐区 -->
  <path class="conn" d="M555 178 L660 132"/>      <!-- 北游乐区-监控室 -->
  <path class="conn" d="M250 196 L210 200"/>      <!-- 北游乐区-赌场 -->
  <path class="conn" d="M450 224 L450 258"/>      <!-- 北游乐区-南游乐区 -->
  <path class="conn" d="M140 240 L225 278"/>      <!-- 赌场-小吃区 -->
  <path class="conn" d="M320 305 L345 292"/>      <!-- 小吃区-南游乐区 -->
  <path class="conn" d="M188 318 L155 330"/>      <!-- 小吃区-南站台 -->
  <path class="conn" d="M590 305 L645 320"/>      <!-- 南游乐区-马戏团帐篷 -->
  <path class="conn" d="M580 270 L668 248"/>      <!-- 南游乐区-占卜屋 -->

  <!-- 过山车轨道（北站台-南站台直达，非步行通道） -->
  <path class="rail" d="M335 90 C 140 55, 30 170, 75 296"/>
  <text x="24" y="150" fill="#ffb86b" font-size="10">过山车轨道直达</text>

  <!-- 房间 -->
  <!-- 北站台 -->
  <rect class="rm" x="330" y="66" width="150" height="62"/>
  <text class="rname" x="405" y="96">北站台</text>
  <text class="ren" x="405" y="114">North Platform · 过山车</text>
  <!-- 监控室 -->
  <rect class="rm" x="610" y="70" width="160" height="72"/>
  <text class="rname" x="690" y="100">监控室</text>
  <text class="ren" x="690" y="118">Security · CCTV/对讲机</text>
  <!-- 北游乐区 -->
  <rect class="rm" x="250" y="160" width="330" height="64"/>
  <text class="rname" x="415" y="188">北游乐区</text>
  <text class="ren" x="415" y="206">North Fairgrounds</text>
  <!-- 赌场 -->
  <rect class="rm" x="60" y="160" width="150" height="80"/>
  <text class="rname" x="135" y="193">赌场</text>
  <text class="ren" x="135" y="211">Casino · 轮盘</text>
  <!-- 占卜屋 -->
  <rect class="rm" x="640" y="180" width="130" height="70"/>
  <text class="rname" x="705" y="209">占卜屋</text>
  <text class="ren" x="705" y="227">Fortune Teller</text>
  <!-- 南游乐区 -->
  <rect class="rm" x="330" y="258" width="270" height="64"/>
  <text class="rname" x="465" y="286">南游乐区</text>
  <text class="ren" x="465" y="304">South Fairgrounds</text>
  <!-- 小吃区 -->
  <rect class="rm" x="185" y="275" width="140" height="72"/>
  <text class="rname" x="255" y="307">小吃区</text>
  <text class="ren" x="255" y="325">Concessions</text>
  <!-- 马戏团帐篷（会议铃 + 老虎） -->
  <rect class="rm" x="615" y="300" width="160" height="88" fill="#3a2535" stroke="#7a4a5a"/>
  <text class="rname" x="695" y="332">马戏团帐篷</text>
  <text class="ren" x="695" y="350">Circus Tent · 会议铃/老虎</text>
  <!-- 南站台 -->
  <rect class="rm" x="30" y="296" width="130" height="78"/>
  <text class="rname" x="95" y="326">南站台</text>
  <text class="ren" x="95" y="344">South Platform · 过山车</text>

  <!-- ===== 标注点（坐标 = 数据中 x%,y% × 800/460）===== -->
  <!-- meeting 帐篷会议铃 80,69 -->
  <g filter="url(#glow)"><circle cx="640" cy="317" r="9" fill="#4ade80"/><text x="640" y="321" font-size="10" text-anchor="middle">🔔</text></g>
  <!-- dispose 老虎毁尸 93,82 -->
  <g filter="url(#glow)"><circle cx="744" cy="377" r="9" fill="#2dd4bf"/><text x="744" y="381" font-size="10" text-anchor="middle">🐯</text></g>
  <!-- hazard 过山车破坏 44,20 -->
  <g filter="url(#glow)"><circle cx="352" cy="92" r="10" fill="#fb923c"/><text x="352" y="96" font-size="11" text-anchor="middle">⚠</text></g>
  <!-- task 监控前置 80,21 -->
  <circle cx="640" cy="96" r="8" fill="#3ba9ff"/><text x="640" y="99" font-size="9" text-anchor="middle">📋</text>
  <!-- killspot 占卜屋 83,45 -->
  <g filter="url(#glow)"><circle cx="664" cy="207" r="9" fill="#ff5470"/><text x="664" y="211" font-size="10" text-anchor="middle">🔪</text></g>
  <!-- task 赌场轮盘 11,42 -->
  <circle cx="88" cy="193" r="8" fill="#3ba9ff"/><text x="88" y="196" font-size="9" text-anchor="middle">📋</text>
  <!-- blindspot 南站台死角 12,79 -->
  <circle cx="96" cy="363" r="8" fill="#b06bff"/><text x="96" y="366" font-size="9" text-anchor="middle">🌫</text>
  <!-- hazard 限时破坏 50,63 -->
  <g filter="url(#glow)"><circle cx="400" cy="290" r="10" fill="#fb923c"/><text x="400" y="294" font-size="11" text-anchor="middle">⚠</text></g>

  <!-- 图例 -->
  <g transform="translate(24,410)">
    <circle cx="6" cy="0" r="6" fill="#3ba9ff"/><text x="18" y="4" fill="#a99fd6" font-size="11">任务点</text>
    <circle cx="92" cy="0" r="6" fill="#ff5470"/><text x="104" y="4" fill="#a99fd6" font-size="11">刀点</text>
    <circle cx="156" cy="0" r="6" fill="#b06bff"/><text x="168" y="4" fill="#a99fd6" font-size="11">盲区</text>
    <circle cx="222" cy="0" r="6" fill="#4ade80"/><text x="234" y="4" fill="#a99fd6" font-size="11">会议铃</text>
    <circle cx="306" cy="0" r="6" fill="#fb923c"/><text x="318" y="4" fill="#a99fd6" font-size="11">破坏/危险</text>
    <circle cx="400" cy="0" r="6" fill="#2dd4bf"/><text x="412" y="4" fill="#a99fd6" font-size="11">毁尸点（老虎）</text>
  </g>
</svg>
